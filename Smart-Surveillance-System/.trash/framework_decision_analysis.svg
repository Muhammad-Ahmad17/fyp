<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Multi-domain visual intelligence framework analysis</title>
  <desc>Framework showing weaknesses of single-domain approach vs a unified multi-application architecture</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; font-weight: 400; fill: #444; }
      .label { font-size: 11px; fill: #888; letter-spacing: 1px; }

      /* c-amber */
      .c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
      .c-amber text { fill: #633806; }

      /* c-red */
      .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
      .c-red text { fill: #501313; }

      /* c-coral */
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral text { fill: #4A1B0C; }

      /* c-teal */
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal text { fill: #04342C; }

      /* c-purple */
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #26215C; }

      /* c-blue */
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue text { fill: #042C53; }

      /* c-green */
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green text { fill: #173404; }

      /* c-gray */
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray text { fill: #2C2C2A; }

      line.arr { stroke: #888; }
      line.leader { stroke: #bbb; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <!-- ── Section: Problem ── -->
  <text class="label" x="40" y="30">WHY THE CURRENT IDEA FALLS SHORT</text>
  <line x1="40" y1="36" x2="640" y2="36" stroke="#ddd" stroke-width="0.5"/>

  <!-- Card 1: Not novel -->
  <g class="c-amber">
    <rect x="40" y="48" width="180" height="88" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="74" text-anchor="middle">Not novel enough</text>
    <text class="ts" x="130" y="94" text-anchor="middle">Smoke sensors cost $5.</text>
    <text class="ts" x="130" y="110" text-anchor="middle">Problem is solved.</text>
    <text class="ts" x="130" y="126" text-anchor="middle">Camera adds complexity.</text>
  </g>

  <!-- Card 2: Not data-intensive -->
  <g class="c-red">
    <rect x="250" y="48" width="180" height="88" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="74" text-anchor="middle">Not data-intensive</text>
    <text class="ts" x="340" y="94" text-anchor="middle">Single camera, single</text>
    <text class="ts" x="340" y="110" text-anchor="middle">event type. Low volume,</text>
    <text class="ts" x="340" y="126" text-anchor="middle">low complexity.</text>
  </g>

  <!-- Card 3: Narrow scope -->
  <g class="c-coral">
    <rect x="460" y="48" width="180" height="88" rx="8" stroke-width="0.5"/>
    <text class="th" x="550" y="74" text-anchor="middle">Narrow scope</text>
    <text class="ts" x="550" y="94" text-anchor="middle">One domain limits your</text>
    <text class="ts" x="550" y="110" text-anchor="middle">architecture story. Hard</text>
    <text class="ts" x="550" y="126" text-anchor="middle">to scale the thesis.</text>
  </g>

  <!-- ── Section: Elevated Framework ── -->
  <text class="label" x="40" y="162">THE ELEVATED FRAMEWORK — SAME BASE, MULTIPLE DOMAINS</text>
  <line x1="40" y1="168" x2="640" y2="168" stroke="#ddd" stroke-width="0.5"/>

  <text class="ts" x="40" y="190" fill="#aaa">Core pipeline (unchanged across all domains)</text>

  <!-- Pipeline boxes -->
  <g class="c-teal">
    <rect x="40" y="200" width="90" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="85" y="221" text-anchor="middle">Camera</text>
    <text class="ts" x="85" y="237" text-anchor="middle">streams</text>
  </g>
  <line x1="130" y1="224" x2="148" y2="224" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="150" y="200" width="90" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="195" y="221" text-anchor="middle">Frame</text>
    <text class="ts" x="195" y="237" text-anchor="middle">sampler</text>
  </g>
  <line x1="240" y1="224" x2="258" y2="224" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="260" y="200" width="100" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="310" y="221" text-anchor="middle">Model</text>
    <text class="ts" x="310" y="237" text-anchor="middle">pipeline</text>
  </g>
  <line x1="360" y1="224" x2="378" y2="224" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="380" y="200" width="100" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="430" y="221" text-anchor="middle">Event</text>
    <text class="ts" x="430" y="237" text-anchor="middle">logic engine</text>
  </g>
  <line x1="480" y1="224" x2="498" y2="224" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="500" y="200" width="80" height="48" rx="6" stroke-width="0.5"/>
    <text class="th" x="540" y="221" text-anchor="middle">Cloud</text>
    <text class="ts" x="540" y="237" text-anchor="middle">dashboard</text>
  </g>

  <!-- Domain modules label -->
  <text class="ts" x="40" y="276" fill="#aaa">Domain modules (plug in/out — swap per application)</text>

  <!-- Connector lines from pipeline to domains -->
  <line x1="310" y1="248" x2="99" y2="286" stroke="#bbb" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="310" y1="248" x2="231" y2="286" stroke="#bbb" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="310" y1="248" x2="363" y2="286" stroke="#bbb" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="310" y1="248" x2="495" y2="286" stroke="#bbb" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Domain 1: Industrial -->
  <g class="c-green">
    <rect x="40" y="286" width="118" height="64" rx="6" stroke-width="0.5"/>
    <text class="th" x="99" y="308" text-anchor="middle">Industrial</text>
    <text class="th" x="99" y="323" text-anchor="middle">Safety</text>
    <text class="ts" x="99" y="340" text-anchor="middle">PPE · hazard zones</text>
  </g>

  <!-- Domain 2: Campus -->
  <g class="c-blue">
    <rect x="172" y="286" width="118" height="64" rx="6" stroke-width="0.5"/>
    <text class="th" x="231" y="308" text-anchor="middle">Smart</text>
    <text class="th" x="231" y="323" text-anchor="middle">Campus</text>
    <text class="ts" x="231" y="340" text-anchor="middle">crowd · anomaly</text>
  </g>

  <!-- Domain 3: Retail -->
  <g class="c-amber">
    <rect x="304" y="286" width="118" height="64" rx="6" stroke-width="0.5"/>
    <text class="th" x="363" y="308" text-anchor="middle">Retail</text>
    <text class="th" x="363" y="323" text-anchor="middle">Analytics</text>
    <text class="ts" x="363" y="340" text-anchor="middle">heatmaps · queues</text>
  </g>

  <!-- Domain 4: Healthcare -->
  <g class="c-teal">
    <rect x="436" y="286" width="118" height="64" rx="6" stroke-width="0.5"/>
    <text class="th" x="495" y="308" text-anchor="middle">Healthcare</text>
    <text class="th" x="495" y="323" text-anchor="middle">Ward</text>
    <text class="ts" x="495" y="340" text-anchor="middle">falls · occupancy</text>
  </g>

  <!-- ── Section: Data Intensity ── -->
  <text class="label" x="40" y="386">WHY THIS IS DATA-INTENSIVE</text>
  <line x1="40" y1="392" x2="640" y2="392" stroke="#ddd" stroke-width="0.5"/>

  <g class="c-gray">
    <rect x="40" y="402" width="136" height="70" rx="6" stroke-width="0.5"/>
    <text class="th" x="108" y="428" text-anchor="middle" style="font-size:18px">~5 GB</text>
    <text class="ts" x="108" y="448" text-anchor="middle">raw/min (10 cams)</text>
    <text class="ts" x="108" y="463" text-anchor="middle">@30fps compressed</text>
  </g>

  <g class="c-gray">
    <rect x="192" y="402" width="136" height="70" rx="6" stroke-width="0.5"/>
    <text class="th" x="260" y="428" text-anchor="middle" style="font-size:18px">30 fps</text>
    <text class="ts" x="260" y="448" text-anchor="middle">per stream · each</text>
    <text class="ts" x="260" y="463" text-anchor="middle">frame = inference job</text>
  </g>

  <g class="c-gray">
    <rect x="344" y="402" width="136" height="70" rx="6" stroke-width="0.5"/>
    <text class="th" x="412" y="428" text-anchor="middle" style="font-size:18px">Multi</text>
    <text class="ts" x="412" y="448" text-anchor="middle">model outputs fused</text>
    <text class="ts" x="412" y="463" text-anchor="middle">per frame</text>
  </g>

  <g class="c-gray">
    <rect x="496" y="402" width="144" height="70" rx="6" stroke-width="0.5"/>
    <text class="th" x="568" y="428" text-anchor="middle" style="font-size:18px">Analytics</text>
    <text class="ts" x="568" y="448" text-anchor="middle">time-series · heatmaps</text>
    <text class="ts" x="568" y="463" text-anchor="middle">historical queries</text>
  </g>

  <!-- ── Section: Novelty ── -->
  <text class="label" x="40" y="506">WHAT MAKES IT NOVEL</text>
  <line x1="40" y1="512" x2="640" y2="512" stroke="#ddd" stroke-width="0.5"/>

  <g class="c-purple">
    <rect x="40" y="522" width="200" height="36" rx="18" stroke-width="0.5"/>
    <text class="th" x="140" y="544" text-anchor="middle">Plugin domain modules</text>
  </g>
  <text class="ts" x="252" y="544">Swap AI modules per environment with no pipeline rewrite</text>

  <g class="c-purple">
    <rect x="40" y="570" width="200" height="36" rx="18" stroke-width="0.5"/>
    <text class="th" x="140" y="592" text-anchor="middle">Edge + cloud hybrid</text>
  </g>
  <text class="ts" x="252" y="592">Inference at edge, analytics + storage in cloud</text>

  <g class="c-purple">
    <rect x="40" y="618" width="200" height="36" rx="18" stroke-width="0.5"/>
    <text class="th" x="140" y="640" text-anchor="middle">Cross-domain anomaly</text>
  </g>
  <text class="ts" x="252" y="640">One model flags unusual patterns regardless of domain config</text>

  <g class="c-purple">
    <rect x="40" y="666" width="200" height="36" rx="18" stroke-width="0.5"/>
    <text class="th" x="140" y="688" text-anchor="middle">Multi-tenant config</text>
  </g>
  <text class="ts" x="252" y="688">Different clients, different domain packs, same backend</text>

  <!-- ── Recommended title ── -->
  <line x1="40" y1="726" x2="640" y2="726" stroke="#ddd" stroke-width="0.5"/>
  <g class="c-blue">
    <rect x="40" y="736" width="600" height="84" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="762" text-anchor="middle">Recommended project title</text>
    <text class="ts" x="340" y="782" text-anchor="middle">Adaptive Multi-Domain Visual Intelligence Platform (AMVIP)</text>
    <text class="ts" x="340" y="800" text-anchor="middle">One framework. Pluggable domain modules. Multiple real-world applications.</text>
    <text class="ts" x="340" y="818" text-anchor="middle">Demonstrated across ≥3 domains with shared core pipeline.</text>
  </g>
</svg>
